services:
  strapi-cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: strapi-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
      REAL_IP_HEADER: Cf-Connecting-Ip
    networks:
      - app
    depends_on:
      - strapi-nginx

  strapi-nginx:
    # Debian Trixie image includes gettext (`envsubst`). Avoid slim tags without envsubst.
    image: nginx:stable-trixie
    container_name: strapi-nginx
    restart: unless-stopped
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-strapi.magicgrants.org}
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./docker/nginx-entrypoint.sh:/scripts/nginx-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/scripts/nginx-entrypoint.sh"]
    networks:
      - app
    depends_on:
      - strapi

  strapi:
    container_name: strapi
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 1337:1337
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapi-postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      APP_KEYS: ${APP_KEYS}
      JWT_SECRET: ${JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      HETZNER_BUCKET_ACCESS_KEY_ID: ${HETZNER_BUCKET_ACCESS_KEY_ID}
      HETZNER_BUCKET_ACCESS_SECRET: ${HETZNER_BUCKET_ACCESS_SECRET}
      HETZNER_BUCKET_REGION: ${HETZNER_BUCKET_REGION}
      HETZNER_BUCKET_NAME: ${HETZNER_BUCKET_NAME}
      HETZNER_BUCKET_ENDPOINT: ${HETZNER_BUCKET_ENDPOINT}
      HETZNER_BUCKET_HOST: ${HETZNER_BUCKET_HOST}
    volumes:
      - ./config:/opt/app/config
      - ./src:/opt/app/src
      - ./package.json:/opt/package.json
      - ./package-lock.json:/opt/package-lock.json
      - ./public/uploads:/opt/app/public/uploads
    networks:
      - app
    depends_on:
      - strapi-postgres

  strapi-postgres:
    container_name: strapi-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: strapi
      POSTGRES_DB: strapi
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - "strapi_postgres_data:/var/lib/postgresql/data"
    networks:
      - app

volumes:
  strapi_postgres_data:

networks:
  app:
    external: true
    name: ${DOCKER_NETWORK_NAME:-magic-prod-network}
